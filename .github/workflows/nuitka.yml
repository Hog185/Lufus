name: Build Nuitka Binary

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
      - "*-beta"

jobs:
  build-nuitka-linux:
    name: Linux one-file binary
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ccache \
            patchelf \
            binutils \
            libgl1 \
            libegl1 \
            libdbus-1-3 \
            libglib2.0-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-keysyms1 \
            libxcb-shape0 \
            libxkbcommon-x11-0

      - name: Set artifact name
        run: |
          safe_ref="$(printf '%s' '${{ github.ref_name }}' | tr '/ ' '--')"
          echo "BUILD_NAME=Lufus-x86_64-${safe_ref}" >> "$GITHUB_ENV"

      - name: Build with Nuitka
        run: |
          chmod +x scripts/build-nuitka.sh
          OUTPUT_NAME="$BUILD_NAME" scripts/build-nuitka.sh

      - name: Verify artifact
        run: |
          ls -lh "dist/nuitka/$BUILD_NAME"
          file "dist/nuitka/$BUILD_NAME"
          cat "dist/nuitka/$BUILD_NAME.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_NAME }}
          path: |
            dist/nuitka/${{ env.BUILD_NAME }}
            dist/nuitka/${{ env.BUILD_NAME }}.sha256
          if-no-files-found: error

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/nuitka/${{ env.BUILD_NAME }}
            dist/nuitka/${{ env.BUILD_NAME }}.sha256
          append_body: true
          prerelease: ${{ contains(github.ref, '-beta') }}
